version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data from Olist"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Cleaned order data from Olist"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: stg_order_payments
    description: "Cleaned payment data from Olist"
    columns:
      - name: order_id
        tests:
          - not_null

  - name: stg_order_items
    description: "Cleaned order items from Olist"
    columns:
      - name: order_id
        tests:
          - not_null